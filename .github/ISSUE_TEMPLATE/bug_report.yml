name: Bug report
description: Report a problem with the Punds NAVI terminal landing page.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report for [Punds](https://punds.ch/).
        Please fill out the fields below so the issue can be reproduced and fixed quickly.
  - type: checkboxes
    id: search
    attributes:
      label: Search for existing issues
      description: Please confirm you have searched the existing issues before opening a new one.
      options:
        - label: I have searched the existing issues and this has not already been reported.
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Tell us what went wrong.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can someone else reproduce this behavior?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: Describe the expected outcome.
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser were you using when the bug occurred?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: Which operating system and version were you on?
      placeholder: e.g. Windows 11, macOS 14, Ubuntu 24.04, iOS 18
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots or a screen recording to help explain the problem. You can drag and drop files here.
      placeholder: Paste or drop screenshots here.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here (console errors, network logs, etc.).
      placeholder: Anything else that might help.
    validations:
      required: false
